# VPS staging — SHARED DB with the proposal tool (one source of truth).
# The portal connects to the proposal tool's staging Postgres (treadwell-staging-db
# on the treadwell-staging_default network), reads real `drafts`, and owns the
# portal_* tables in that same DB. DEV_SEED is OFF so it never injects stand-in
# drafts into the real table. OTP is delivered by EMAIL (Resend wired via .env) and
# is NOT shown on-screen — mirrors prod. Secrets (RESEND_API_KEY, EMAIL_FROM) live in
# .env on the VPS, never committed.
services:
  app:
    build: .
    image: treadwell-portal-staging:latest   # pinned so prod can `up -d` a prebuilt image (no on-box build)
    container_name: treadwell-portal-staging
    restart: unless-stopped
    ports:
      - "127.0.0.1:8899:8898"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:staging_pg_pw@treadwell-staging-db:5432/treadwell
      PUBLIC_BASE_URL: https://staging.portal.wetreadwell.com
      ENVIRONMENT: staging
      DEV_SEED: "false"
      PORTAL_SHOW_OTP: "false"
      SERVICE_TOKEN: "stg-svc-3a9f2c7e1b4d8650"
      # Reach the proposal tool over the shared docker network (avoids the public
      # nginx hairpin/502); both are on treadwell-staging_default.
      PROPOSAL_TOOL_URL: "http://treadwell-staging:8888"
      # PUBLIC staff-tool URL for staff-notification "Reply in Portal" links. Must be
      # the STAGING staff tool (the config default is prod) so staging test emails
      # don't deep-link a staging-only proposal_id into the prod board (would 404).
      PROPOSAL_TOOL_PUBLIC_URL: "https://staging.proposals.wetreadwell.com"
      # Inbound email capture (Resend receiving): per-proposal Reply-To =
      # <token>@<domain>; replies webhook back into the CRM thread. The svix
      # signing secret (RESEND_WEBHOOK_SECRET) lives in .env on the VPS. Every
      # captured reply is also forwarded to INBOUND_FORWARD_EMAIL (per Hanz).
      RESEND_INBOUND_DOMAIN: "piaxenoizh.resend.app"
      # Staging forwards to Hanz only (per Hanz — don't email Will on staging).
      # will@wetreadwell.com gets added to this list on PROD, not here.
      INBOUND_FORWARD_EMAIL: "hanz@wetreadwell.com"
      # PLACEHOLDER bank-transfer details so the deposit card renders on staging.
      # Prod uses Treadwell's real details set in /opt/treadwell-portal/.env.
      PORTAL_DEPOSIT_BENEFICIARY: "Treadwell LLC (TEST)"
      PORTAL_DEPOSIT_BANK: "Test Bank, N.A. (staging)"
      PORTAL_DEPOSIT_ROUTING: "000000000"
      PORTAL_DEPOSIT_ACCOUNT: "TEST-000123456"
    networks:
      - shared

networks:
  shared:
    external: true
    name: treadwell-staging_default
